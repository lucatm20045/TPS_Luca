<!DOCTYPE html>
<html>
<head>
    <title>Calcolatrice</title>
</head>
<body>

<h2>Calcolatrice</h2>

<form id="calcForm">
    Numero 1:
    <input type="text" id="num1"><br><br>

    Operazione:
    <input type="text" id="op" placeholder="add, sub, mul, div"><br><br>

    Numero 2:
    <input type="text" id="num2"><br><br>

    <button type="button" onclick="calcola()">Calcola</button>
</form>

<p id="risultato"></p>

<script>
function calcola() {

    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
    let op = document.getElementById("op").value;

    let risultato;

    if (isNaN(n1) || isNaN(n2)) {
        document.getElementById("risultato").innerText = "Errore: inserire numeri validi";
        return;
    }

    if (op === "add") {
        risultato = n1 + n2;
    } else if (op === "sub") {
        risultato = n1 - n2;
    } else if (op === "mul") {
        risultato = n1 * n2;
    } else if (op === "div") {
        if (n2 === 0) {
            document.getElementById("risultato").innerText = "Errore: divisione per zero";
            return;
        }
        risultato = n1 / n2;
    } else {
        document.getElementById("risultato").innerText = "Operazione non valida";
        return;
    }

    document.getElementById("risultato").innerText = "Risultato: " + risultato;
}
</script>

</body>
</html>
