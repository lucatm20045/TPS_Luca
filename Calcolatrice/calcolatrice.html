<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatrice</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        #risultato {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calcolatrice</h2>

    <form id="calcForm">
        <input type="text" id="num1" placeholder="Numero 1">

        <select id="op">
            <option value="add">Somma (+)</option>
            <option value="sub">Sottrazione (-)</option>
            <option value="mul">Moltiplicazione (×)</option>
            <option value="div">Divisione (÷)</option>
        </select>

        <input type="text" id="num2" placeholder="Numero 2">

        <button type="button" onclick="calcola()">Calcola</button>
    </form>

    <p id="risultato"></p>
</div>

<script>
function calcola() {

    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
    let op = document.getElementById("op").value;

    let risultatoEl = document.getElementById("risultato");
    risultatoEl.classList.remove("error");

    let risultato;

    if (isNaN(n1) || isNaN(n2)) {
        risultatoEl.innerText = "Errore: inserire numeri validi";
        risultatoEl.classList.add("error");
        return;
    }

    if (op === "add") {
        risultato = n1 + n2;
    } else if (op === "sub") {
        risultato = n1 - n2;
    } else if (op === "mul") {
        risultato = n1 * n2;
    } else if (op === "div") {
        if (n2 === 0) {
            risultatoEl.innerText = "Errore: divisione per zero";
            risultatoEl.classList.add("error");
            return;
        }
        risultato = n1 / n2;
    } else {
        risultatoEl.innerText = "Operazione non valida";
        risultatoEl.classList.add("error");
        return;
    }

    risultatoEl.innerText = "Risultato: " + risultato;
}
</script>

</body>
</html>
